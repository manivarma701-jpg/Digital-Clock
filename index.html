<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Digital Clock</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0a0a0f;
      font-family: 'Share Tech Mono', monospace;
      overflow: hidden;
    }

    .scanlines {
      position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,255,180,0.015) 2px, rgba(0,255,180,0.015) 4px);
      pointer-events: none; z-index: 10;
    }

    .clock-wrapper {
      text-align: center;
      position: relative;
    }

    .date-display {
      font-family: 'Share Tech Mono', monospace;
      font-size: clamp(0.75rem, 2vw, 1rem);
      color: #00ffb4;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      opacity: 0.7;
      margin-bottom: 1.5rem;
    }

    .time-display {
      font-family: 'Orbitron', monospace;
      font-size: clamp(3rem, 12vw, 8rem);
      font-weight: 900;
      color: #00ffb4;
      text-shadow: 0 0 20px #00ffb4, 0 0 60px #00ffb480, 0 0 120px #00ffb430;
      letter-spacing: 0.05em;
      line-height: 1;
      transition: all 0.1s;
    }

    .time-display .colon {
      animation: blink 1s step-end infinite;
      display: inline-block;
    }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.15} }

    .seconds-bar-wrap {
      margin-top: 2rem;
      width: clamp(280px, 60vw, 600px);
    }

    .seconds-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.65rem;
      color: #00ffb450;
      letter-spacing: 0.2em;
      margin-bottom: 0.5rem;
    }

    .seconds-bar {
      height: 3px;
      background: #00ffb415;
      border-radius: 2px;
      overflow: hidden;
    }

    .seconds-fill {
      height: 100%;
      background: linear-gradient(90deg, #00ffb4, #00e5ff);
      border-radius: 2px;
      transition: width 1s linear;
      box-shadow: 0 0 10px #00ffb4;
    }

    .timezone {
      margin-top: 1.5rem;
      font-size: 0.7rem;
      color: #00ffb430;
      letter-spacing: 0.25em;
    }

    .theme-switcher {
      margin-top: 2.5rem;
      display: flex;
      gap: 0.75rem;
      justify-content: center;
    }

    .theme-btn {
      width: 22px; height: 22px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      transition: transform 0.2s, border-color 0.2s;
    }

    .theme-btn:hover, .theme-btn.active { transform: scale(1.3); border-color: #fff; }

    .t-green  { background: #00ffb4; }
    .t-blue   { background: #00b4ff; }
    .t-purple { background: #b400ff; }
    .t-red    { background: #ff4444; }
    .t-gold   { background: #ffcc00; }
  </style>
</head>
<body>
  <div class="scanlines"></div>

  <div class="clock-wrapper">
    <div class="date-display" id="dateDisplay"></div>
    <div class="time-display" id="timeDisplay">
      <span id="hh">00</span><span class="colon">:</span><span id="mm">00</span><span class="colon">:</span><span id="ss">00</span>
    </div>
    <div class="seconds-bar-wrap">
      <div class="seconds-label"><span>SEC</span><span id="secNum">0</span></div>
      <div class="seconds-bar"><div class="seconds-fill" id="secFill" style="width:0%"></div></div>
    </div>
    <div class="timezone" id="tz"></div>

    <div class="theme-switcher">
      <div class="theme-btn t-green  active" onclick="setTheme('#00ffb4','#00e5ff')"></div>
      <div class="theme-btn t-blue"          onclick="setTheme('#00b4ff','#0066ff')"></div>
      <div class="theme-btn t-purple"        onclick="setTheme('#b400ff','#ff00cc')"></div>
      <div class="theme-btn t-red"           onclick="setTheme('#ff4444','#ff8800')"></div>
      <div class="theme-btn t-gold"          onclick="setTheme('#ffcc00','#ff8800')"></div>
    </div>
  </div>

  <script>
    const days   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

    function pad(n){ return String(n).padStart(2,'0'); }

    function tick() {
      const now = new Date();
      document.getElementById('hh').textContent = pad(now.getHours());
      document.getElementById('mm').textContent = pad(now.getMinutes());
      document.getElementById('ss').textContent = pad(now.getSeconds());
      document.getElementById('dateDisplay').textContent =
        `${days[now.getDay()]} · ${months[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()}`;
      const sec = now.getSeconds();
      document.getElementById('secFill').style.width = (sec/59*100)+'%';
      document.getElementById('secNum').textContent = pad(sec);
      document.getElementById('tz').textContent = Intl.DateTimeFormat().resolvedOptions().timeZone;
    }

    function setTheme(c1, c2) {
      document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');
      const r = document.documentElement.style;
      document.querySelector('.time-display').style.color = c1;
      document.querySelector('.time-display').style.textShadow =
        `0 0 20px ${c1}, 0 0 60px ${c1}80, 0 0 120px ${c1}30`;
      document.querySelector('.seconds-fill').style.background = `linear-gradient(90deg,${c1},${c2})`;
      document.querySelector('.seconds-fill').style.boxShadow = `0 0 10px ${c1}`;
      document.querySelector('.date-display').style.color = c1;
    }

    tick(); setInterval(tick, 1000);
  </script>
</body>
</html>
